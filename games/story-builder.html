<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Builder | AMORA.AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/src/styles/design-tokens.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/src/scripts/toast.js"></script>
    <style>
        :root {
            --primary-color: #6B5B95;
            --secondary-color: #8B7AA8;
            --bg-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333;
            --text-muted: #666;
            --success-color: #2ec4b6;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .top-navigation {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 1rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(107, 91, 149, 0.25);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(107, 91, 149, 0.35);
        }

        .game-wrapper {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(107, 91, 149, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .game-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .game-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* Story container */
        .story-display {
            background: #fff;
            border: 1px solid rgba(107, 91, 149, 0.15);
            border-radius: 18px;
            padding: 1.5rem;
            min-height: 220px;
            max-height: 350px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 1.5rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .story-para-user {
            color: #333;
            font-weight: 500;
            margin-bottom: 0.75rem;
            border-left: 3px solid var(--primary-color);
            padding-left: 0.75rem;
        }

        .story-para-ai {
            color: #555;
            font-style: italic;
            margin-bottom: 0.75rem;
            border-left: 3px dashed var(--secondary-color);
            padding-left: 0.75rem;
        }

        .story-placeholder {
            color: #999;
            font-style: italic;
            text-align: center;
            padding-top: 3rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .story-textarea {
            width: 100%;
            min-height: 80px;
            padding: 1rem;
            border: 2px solid rgba(107, 91, 149, 0.25);
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            color: #333;
            outline: none;
            resize: none;
            transition: border-color 0.3s ease;
        }

        .story-textarea:focus {
            border-color: var(--primary-color);
        }

        .action-row {
            display: flex;
            gap: 1rem;
        }

        .game-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem 1.8rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .game-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(107, 91, 149, 0.25);
        }

        .game-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-secondary {
            background: rgba(107, 91, 149, 0.15);
            color: var(--primary-color);
        }

        .btn-secondary:hover {
            background: rgba(107, 91, 149, 0.25);
            box-shadow: none;
        }

        @media (max-width: 480px) {
            .action-row {
                flex-direction: column;
            }
            .game-wrapper {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="game-header">
        <a href="/dashboard.html" class="btn btn-ghost">
            ← Back to Dashboard
        </a>
        <h1 class="game-title">Story Builder</h1>
        <div class="game-score">
            High: <span id="high-score">0</span>
        </div>
    </header>

    <div class="game-wrapper card">
        <p class="game-desc">Write a sentence to begin. AMORA will dynamically continue your story!</p>

        <!-- Story Content canvas -->
        <div class="story-display" id="story-display">
            <p class="story-placeholder" id="story-placeholder">Start typing below to craft your story...</p>
        </div>

        <!-- Story Input -->
        <form id="story-form" class="input-group" onsubmit="handleStorySubmit(event)">
            <textarea id="story-input" class="story-textarea textarea" placeholder="Type your next sentence here..." required autocomplete="off"></textarea>
            <button type="submit" class="game-btn btn btn-primary" id="submit-btn"><i class="fas fa-paper-plane"></i> Add Sentence</button>
        </form>

        <!-- Bottom Actions -->
        <div class="action-row">
            <button class="game-btn btn btn-secondary" onclick="exportStory()" style="flex: 1;">
                <i class="fas fa-download"></i> Save Story (.txt)
            </button>
            <button class="game-btn btn btn-danger" onclick="clearStory()" style="flex: 1; border: none;">
                <i class="fas fa-trash-alt"></i> New Story
            </button>
        </div>
    </div>

    <script>
        // 30 pre-written story continuations
        const CONTINUATIONS = [
            "Suddenly, a strange noise echoed from the dark hallway.",
            "She looked up and saw a shadow slipping through the window.",
            "The door creaked open slowly, revealing a golden glow inside.",
            "A cold breeze swept through the room, putting out the candles.",
            "Without warning, the map in his hands began to glow bright blue.",
            "Just then, a small envelope slid under the door.",
            "A sudden realization hit him like a lightning bolt.",
            "Outside, the rain began to fall in heavy, rhythmic sheets.",
            "Deep in the woods, something was waiting for them.",
            "The grandfather clock in the corner chimed thirteen times.",
            "An old chest sat in the attic, calling out to be opened.",
            "She held her breath, listening to the approaching footsteps.",
            "A mysterious message flashed across the computer screen.",
            "The stranger turned around, wearing a peculiar silver mask.",
            "He found a strange stone key hidden inside the drawer.",
            "Far in the distance, a lighthouse beam flickered twice.",
            "Everything fell completely silent, as if time itself had stopped.",
            "She knew she shouldn't look, but curiosity overcame her.",
            "He grabbed his coat, knowing there was no turning back now.",
            "A mechanical whirring sound filled the underground vault.",
            "An ancient inscription on the wall started to make sense.",
            "Just as she gave up, a tiny creature hopped out of the grass.",
            "The tea in his cup began to ripple, though nothing had moved.",
            "A warm, inviting scent of pine and cinnamon filled the room.",
            "He reached into his pocket and realized the artifact was gone.",
            "She noticed a small, hidden doorway behind the bookshelf.",
            "A soft voice whispered a name she hadn't heard in years.",
            "The sky turned an unusual shade of violet as the sun went down.",
            "Under the floorboards, a faint ticking sound began to grow louder.",
            "Without another word, they stepped into the portal."
        ];

        let storyParagraphs = [];

        function handleStorySubmit(event) {
            event.preventDefault();
            const input = document.getElementById('story-input');
            const text = input.value.trim();
            if (!text) return;

            // Remove placeholder if present
            const placeholder = document.getElementById('story-placeholder');
            if (placeholder) placeholder.remove();

            // Add user sentence
            storyParagraphs.push({ sender: 'user', text: text });
            renderParagraph('user', text);

            input.value = '';
            
            // Wait slightly and generate AI reply
            const submitBtn = document.getElementById('submit-btn');
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner spinner-sm spinner-white" style="margin-right: 8px; vertical-align: middle;"></span> Adding...';
            
            setTimeout(() => {
                const randomCont = CONTINUATIONS[Math.floor(Math.random() * CONTINUATIONS.length)];
                storyParagraphs.push({ sender: 'ai', text: randomCont });
                renderParagraph('ai', randomCont);
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;
            }, 800);
        }

        function renderParagraph(sender, text) {
            const display = document.getElementById('story-display');
            const p = document.createElement('div');
            p.className = sender === 'user' ? 'story-para-user' : 'story-para-ai';
            p.textContent = text;
            display.appendChild(p);

            // Auto scroll to bottom
            display.scrollTop = display.scrollHeight;
        }

        function exportStory() {
            if (storyParagraphs.length === 0) {
                showToast('Your story is empty! Write some sentences first.', 'warning');
                return;
            }

            const fullText = storyParagraphs.map(p => {
                const prefix = p.sender === 'user' ? '[You]: ' : '[AMORA]: ';
                return prefix + p.text;
            }).join('\n\n');

            try {
                const blob = new Blob([fullText], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const timestamp = new Date().toISOString().slice(0, 10);
                a.download = `amora-story-${timestamp}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                showToast('Export failed: ' + err.message, 'error');
            }
        }

        function clearStory() {
            storyParagraphs = [];
            const display = document.getElementById('story-display');
            display.innerHTML = '<p class="story-placeholder" id="story-placeholder">Start typing below to craft your story...</p>';
        }
    </script>
</body>
</html>
